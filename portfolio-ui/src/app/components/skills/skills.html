<section id="skills" class="skills-section dot-grid">
  <div class="container">
    <div class="section-header">
      <span class="eyebrow">Technical Expertise</span>
      <h2 class="section-title">Skills &amp; Technologies</h2>
      <p class="section-subtitle">A curated set of tools I use to build scalable, modern, cloud-native solutions.</p>
    </div>

    <div class="skills-grid">
      @for (skill of skills(); track skill.category) {
        <div class="skill-card glass-card animate-fade-up">
          <div class="skill-header">
            <i [class]="iconFor(skill.category) + ' skill-icon'"></i>
            <h3 class="skill-category">{{ skill.category }}</h3>
          </div>
          <div class="skill-tags">
            @for (item of skill.items; track item) {
              <span class="skill-tag">{{ item }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
