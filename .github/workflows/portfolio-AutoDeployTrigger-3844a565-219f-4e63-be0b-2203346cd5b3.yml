name: Trigger auto deployment for portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Portfolio.Api
          file: ./Portfolio.Api/Dockerfile
          push: true
          tags: ghcr.io/raghu1813/portfolio-api:latest,ghcr.io/raghu1813/portfolio-api:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PORTFOLIO_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PORTFOLIO_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PORTFOLIO_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: portfolio
          resourceGroup: personal
          imageToDeploy: ghcr.io/raghu1813/portfolio-api:${{ github.sha }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}


