name: Deploy Portfolio API to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build and publish
        run: dotnet publish Portfolio.Api/Portfolio.Api.csproj -c Release -o ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PORTFOLIO_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PORTFOLIO_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PORTFOLIO_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: portfolio-api
          package: ./publish
          startup-command: dotnet Portfolio.Api.dll


